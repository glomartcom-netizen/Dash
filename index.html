<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DimeX | Universal Staking Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #020617; color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); transition: transform 0.2s ease; }
        .glass:hover { transform: translateY(-2px); }
        .gold-text { background: linear-gradient(90deg, #fbbf24, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-gold { background: linear-gradient(90deg, #fbbf24, #f59e0b); color: #000; font-weight: 800; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-gold:active { transform: scale(0.95); }
        .tab-btn.active { border-bottom: 2px solid #f59e0b; color: #f59e0b; }
        .progress-bg { background: rgba(255,255,255,0.05); border-radius: 10px; height: 10px; overflow: hidden; }
        .progress-bar { background: linear-gradient(90deg, #fbbf24, #f59e0b); transition: width 1s ease-in-out; }
        .spinner { border: 2px solid rgba(255,255,255,0.1); border-top: 2px solid #fbbf24; border-radius: 50%; width: 16px; height: 16px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>

<body class="pb-10">
<header class="p-4 border-b border-white/10 glass sticky top-0 z-50 flex justify-between items-center">
    <div class="flex items-center gap-2">
        <img src="https://i.ibb.co/HpqwGFqt/logo.png" class="w-10 h-10" alt="DimeX Logo">
        <span class="text-xl font-black gold-text tracking-tighter uppercase">DimeX Pro</span>
    </div>
    <div class="flex gap-2">
        <button id="connectBtn" onclick="initConnect()" class="btn-gold px-5 py-2 rounded-2xl text-[10px] uppercase shadow-lg shadow-yellow-500/10 font-bold tracking-wider">Connect Wallet</button>
        <button id="disconnectBtn" onclick="disconnectWallet()" class="hidden bg-red-500/10 text-red-500 border border-red-500/20 px-4 py-2 rounded-2xl text-[10px] font-bold">LOGOUT</button>
    </div>
</header>

<main class="max-w-4xl mx-auto p-4 mt-6">
    <div id="statusMsg" class="hidden mb-4 p-3 rounded-lg bg-yellow-500/10 border border-yellow-500/30 text-yellow-500 text-[10px] font-bold text-center"></div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
        <div class="glass p-5 rounded-3xl border-t-2 border-yellow-500/30 text-center">
            <p class="text-[9px] text-gray-500 uppercase font-black mb-1">Total Platform TVL</p>
            <p id="totalTVL" class="text-2xl font-black gold-text">Syncing...</p>
        </div>
        <div class="glass p-5 rounded-3xl border-t-2 border-blue-500/30 text-center">
            <p class="text-[9px] text-gray-500 uppercase font-black mb-1">Active Members</p>
            <p id="totalMembers" class="text-2xl font-black text-white">-</p>
        </div>
        <div class="glass p-5 rounded-3xl border-t-2 border-emerald-500/30 text-center">
            <p class="text-[9px] text-gray-500 uppercase font-black mb-1">Total Rewards Distributed</p>
            <p id="totalRewards" class="text-2xl font-black text-emerald-400">0 DMX</p>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
        <div class="glass p-6 rounded-3xl border border-white/5">
            <h3 class="text-[10px] font-black text-gray-500 uppercase mb-4 tracking-widest">Balances</h3>
            <div class="flex justify-between items-center mb-3">
                <span class="text-xs font-bold text-gray-300">DMX:</span>
                <span id="dmxBal" class="text-sm font-black">0.00</span>
            </div>
            <div class="flex justify-between items-center">
                <span class="text-xs font-bold text-gray-300">USDT:</span>
                <span id="usdtBal" class="text-sm font-black text-emerald-500">0.00</span>
            </div>
        </div>
        <div class="glass p-6 rounded-3xl border border-white/5">
            <div class="flex justify-between items-center mb-2">
                <h3 class="text-[10px] font-black text-gray-500 uppercase tracking-widest">4X Growth Cap</h3>
                <span id="progressText" class="text-[10px] font-black text-yellow-500">0%</span>
            </div>
            <div class="progress-bg mb-2"><div id="progressBar" class="h-full progress-bar" style="width: 0%"></div></div>
            <p id="capValues" class="text-[9px] text-gray-500 font-bold text-center uppercase tracking-tighter">0 / 0 DMX Earned</p>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
        <section class="glass p-6 rounded-3xl">
            <h2 class="text-md font-black gold-text uppercase mb-4 tracking-tight">New Stake</h2>
            <div class="space-y-4">
                <select id="tokenType" class="w-full p-4 rounded-2xl text-xs font-bold outline-none border border-white/10 bg-slate-900 focus:border-yellow-500 transition-all">
                    <option value="USDT">BEP20 USDT (Min 25)</option>
                    <option value="DMX">DMX Token (Min 5000)</option>
                </select>
                <input id="stakeAmount" type="number" placeholder="0.00" class="w-full p-4 rounded-2xl text-lg font-black outline-none bg-black/20 border border-white/10 focus:border-yellow-500 transition-all">
                <div class="flex gap-2">
                    <button id="approveBtn" onclick="approveMax()" class="flex-1 bg-slate-800 p-4 rounded-2xl font-black text-[10px] uppercase flex items-center justify-center gap-2 hover:bg-slate-700">
                        <span>Approve Token</span><div id="approveSpin" class="hidden spinner"></div>
                    </button>
                    <button id="stakeBtn" onclick="stakeNow()" class="flex-1 btn-gold p-4 rounded-2xl font-black text-[10px] uppercase flex items-center justify-center gap-2">
                        <span>Stake</span><div id="stakeSpin" class="hidden spinner"></div>
                    </button>
                </div>
            </div>
        </section>

        <section class="glass p-6 rounded-3xl flex flex-col justify-between">
            <h2 class="text-md font-black text-white uppercase mb-4 tracking-tight">Available Rewards</h2>
            <div class="bg-black/30 p-6 rounded-2xl text-center mb-4 border border-white/5">
                <p id="claimableAmt" class="text-4xl font-black text-yellow-500">0.00</p>
                <p class="text-[9px] text-gray-600 uppercase font-bold mt-2 tracking-widest">DMX EARNED</p>
            </div>
            <button id="claimBtn" onclick="claimRewards()" class="w-full btn-gold p-4 rounded-2xl uppercase font-black text-[10px] flex items-center justify-center gap-2">
                <span>Withdraw All</span><div id="claimSpin" class="hidden spinner"></div>
            </button>
        </section>
    </div>

    <section class="glass rounded-3xl overflow-hidden mb-8 border border-white/5">
        <div class="flex border-b border-white/10 bg-white/5">
            <button onclick="showTab('leaderboard')" class="tab-btn flex-1 p-4 text-[10px] font-black uppercase active tracking-widest">🏆 Leaderboard</button>
            <button onclick="showTab('stakeHistory')" class="tab-btn flex-1 p-4 text-[10px] font-black uppercase tracking-widest">My Stakes</button>
        </div>
        <div id="tabContent" class="p-5 min-h-[300px]"></div>
    </section>

    <section class="glass p-4 rounded-2xl flex items-center justify-between border border-white/5">
        <div class="truncate mr-4"><p class="text-[9px] uppercase font-black text-gray-500">Referral ID</p><p id="refUrl" class="text-[10px] font-mono text-yellow-500 truncate">Login to view link</p></div>
        <button onclick="copyRef()" class="bg-yellow-500 text-black px-5 py-2 rounded-xl text-[10px] font-black uppercase active:scale-95">Copy Link</button>
    </section>
</main>

<script>
    const BSC_CHAIN_ID = "0x38";
    const USDT_ADDR = "0x55d398326f99059fF775485246999027B3197955";
    const DMX_ADDR = "YOUR_DMX_ADDRESS";
    const STAKE_ADDR = "YOUR_STAKING_CONTRACT_ADDRESS";
    const ZERO_ADDRESS = "0x0000000000000000000000000000000000000000";

    const ERC20_ABI = ["function approve(address,uint256) external returns(bool)", "function balanceOf(address) view returns(uint256)"];
    const STAKE_ABI = [
        "function getFullDashboardStats(address) view returns(uint256,uint256,uint256,uint256,uint256,uint256,uint256,uint256,uint256)",
        "function getStakeHistory(address) view returns(tuple(uint256 amountDMX, uint256 start, uint256 end, uint256 lastClaim, uint256 rewardRateBPS, bool active)[])",
        "function stakeDMX(uint256,uint256,address) external",
        "function stakeUSDT(uint256,uint256,address) external",
        "function claim() external",
        "function totalStaked() view returns(uint256)",
        "function totalRewardsDistributed() view returns(uint256)"
    ];

    let provider, signer, contract, userAddress;

    async function initConnect() {
        if (!window.ethereum) return alert("Please Install MetaMask");
        try {
            provider = new ethers.providers.Web3Provider(window.ethereum);
            try {
                await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: BSC_CHAIN_ID }] });
            } catch (switchError) {
                if (switchError.code === 4902) {
                    await window.ethereum.request({
                        method: 'wallet_addEthereumChain',
                        params: [{ chainId: BSC_CHAIN_ID, chainName: 'BSC Mainnet', rpcUrls: ['https://bsc-dataseed.binance.org/'], nativeCurrency: { name: 'BNB', symbol: 'BNB', decimals: 18 }, blockExplorerUrls: ['https://bscscan.com/'] }]
                    });
                }
            }
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            userAddress = accounts[0];
            setupApp();
        } catch (e) { console.error(e); }
    }

    function setupApp() {
        signer = provider.getSigner();
        contract = new ethers.Contract(STAKE_ADDR, STAKE_ABI, signer);
        document.getElementById('connectBtn').innerText = userAddress.slice(0,6)+"..."+userAddress.slice(-4);
        document.getElementById("disconnectBtn").classList.remove("hidden");
        document.getElementById('refUrl').innerText = window.location.origin + "?ref=" + userAddress;
        refreshData();
        showTab('leaderboard');
        setInterval(refreshData, 30000);
        localStorage.setItem("walletConnected", "true");
    }

    async function refreshData() {
        if(!userAddress) return;
        try {
            const f = ethers.utils.formatEther;
            const d = await contract.getFullDashboardStats(userAddress);
            const earned = Number(f(d[7]));
            const stakeAmt = Number(f(d[0]));
            const cap = stakeAmt * 4;
            const perc = cap > 0 ? Math.min((earned / cap) * 100, 100) : 0;
            
            document.getElementById('progressBar').style.width = perc + "%";
            document.getElementById('progressText').innerText = perc.toFixed(1) + "%";
            document.getElementById('capValues').innerText = `${earned.toFixed(0)} / ${cap.toFixed(0)} DMX Earned`;
            document.getElementById('claimableAmt').innerText = earned.toFixed(2);

            try {
                const tvl = await contract.totalStaked();
                const totalRew = await contract.totalRewardsDistributed();
                document.getElementById('totalTVL').innerText = Number(f(tvl)).toLocaleString() + " DMX";
                document.getElementById('totalRewards').innerText = Number(f(totalRew)).toLocaleString() + " DMX";
            } catch(e) {}

            const dmx = new ethers.Contract(DMX_ADDR, ERC20_ABI, provider);
            const usdt = new ethers.Contract(USDT_ADDR, ERC20_ABI, provider);
            document.getElementById('dmxBal').innerText = Number(f(await dmx.balanceOf(userAddress))).toLocaleString();
            document.getElementById('usdtBal').innerText = Number(ethers.utils.formatUnits(await usdt.balanceOf(userAddress), 6)).toLocaleString();
        } catch(e) { console.error(e); }
    }

    async function showTab(type) {
        const container = document.getElementById('tabContent');
        container.innerHTML = `<div class="flex justify-center py-16"><div class="spinner"></div></div>`;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        const btn = document.querySelector(`[onclick="showTab('${type}')"]`);
        if(btn) btn.classList.add('active');

        if(type === 'leaderboard') {
            container.innerHTML = `<div class="text-center text-gray-500 text-[10px] py-16 uppercase font-black tracking-widest">Leaderboard will appear soon</div>`;
        } else if(type === 'stakeHistory') {
            try {
                const hist = await contract.getStakeHistory(userAddress);
                container.innerHTML = hist.length ? hist.map(s => `
                    <div class="p-4 bg-white/5 rounded-2xl flex justify-between items-center text-[11px] mb-2 border border-white/5">
                        <span class="font-black text-gray-300">${ethers.utils.formatEther(s.amountDMX)} DMX</span>
                        <span class="text-emerald-500 font-black px-3 py-1 bg-emerald-500/10 rounded-lg">ACTIVE</span>
                    </div>`).join('') : `<p class="text-center py-16 text-gray-600 text-[10px] uppercase font-black">No stakes found</p>`;
            } catch(e) { container.innerHTML = "History Sync Error"; }
        }
    }

    // --- Action Functions with Guards ---

    async function stakeNow() {
        if(!userAddress) return alert("Connect Wallet First");
        const amt = document.getElementById('stakeAmount').value;
        if(!amt || amt <= 0) return alert("Enter Amount");

        const type = document.getElementById('tokenType').value;
        if(type === "USDT" && amt < 25) return alert("Min 25 USDT");
        if(type === "DMX" && amt < 5000) return alert("Min 5000 DMX");

        setBtnLoading("stakeBtn", true);
        try {
            let ref = new URLSearchParams(window.location.search).get('ref') || ZERO_ADDRESS;
            if(ref.toLowerCase() === userAddress.toLowerCase()) ref = ZERO_ADDRESS;

            const dec = type === "USDT" ? 6 : 18;
            const tx = type === "USDT" ? 
                await contract.stakeUSDT(ethers.utils.parseUnits(amt, dec), 31536000, ref) : 
                await contract.stakeDMX(ethers.utils.parseUnits(amt, 18), 31536000, ref);
            
            showStatus("Blockchain transaction pending...");
            await tx.wait();
            refreshData(); showStatus("Staking Successful!");
        } catch(e) { handleErr(e); }
        setBtnLoading("stakeBtn", false);
    }

    async function approveMax() {
        if(!userAddress) return alert("Connect Wallet First");
        setBtnLoading("approveBtn", true);
        try {
            const type = document.getElementById('tokenType').value;
            const token = new ethers.Contract(type === "USDT" ? USDT_ADDR : DMX_ADDR, ERC20_ABI, signer);
            const tx = await token.approve(STAKE_ADDR, ethers.constants.MaxUint256);
            showStatus("Approval in progress...");
            await tx.wait(); showStatus("Token Approved!");
        } catch(e) { handleErr(e); }
        setBtnLoading("approveBtn", false);
    }

    async function claimRewards() {
        if(!userAddress) return alert("Connect Wallet First");
        setBtnLoading("claimBtn", true);
        try {
            const tx = await contract.claim();
            await tx.wait(); refreshData(); showStatus("Withdrawal Complete!");
        } catch(e) { handleErr(e); }
        setBtnLoading("claimBtn", false);
    }

    function setBtnLoading(id, state) {
        const btn = document.getElementById(id); btn.disabled = state;
        const spin = document.getElementById(id.replace('Btn', 'Spin'));
        if(spin) spin.classList.toggle('hidden', !state);
    }

    function showStatus(m) {
        const s = document.getElementById('statusMsg');
        s.innerText = m; s.classList.remove('hidden');
        setTimeout(() => s.classList.add('hidden'), 5000);
    }

    function handleErr(e) {
        const m = e.reason || e.message || "Error";
        alert(m.includes("user rejected") ? "Transaction Cancelled" : m.slice(0, 60));
    }

    function disconnectWallet() { localStorage.clear(); location.reload(); }
    function copyRef() { navigator.clipboard.writeText(document.getElementById('refUrl').innerText); alert("Referral Copied!"); }
    window.onload = () => { if(localStorage.getItem("walletConnected")) initConnect(); }
</script>
</body>
</html>
